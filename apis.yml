aid: sage-intacct
name: Sage Intacct
description: >-
  Sage Intacct is a cloud-based financial management and accounting platform
  built for growing and mid-market businesses, covering core financials,
  multi-entity consolidations, project and revenue accounting, and advanced
  reporting. Sage Intacct offers both a modern REST API (OAuth 2.0) and a
  long-standing XML API for programmatic access to general ledger, accounts
  payable, accounts receivable, cash management, order entry, purchasing, and
  custom dimensions.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Accounting
  - Financial Management
  - ERP
  - General Ledger
  - Accounts Payable
  - Accounts Receivable
  - Mid-Market
url: https://raw.githubusercontent.com/api-evangelist/sage-intacct/refs/heads/main/apis.yml
created: '2026-05-11'
modified: '2026-05-11'
specificationVersion: '0.19'
apis:
  - aid: sage-intacct:rest-api
    name: Sage Intacct REST API
    description: >-
      Modern REST API for Sage Intacct using OAuth 2.0 Bearer token
      authentication. Provides standard HTTP verbs for managing core financial
      objects (GL, AP, AR), dimensions, customers, vendors, and custom
      objects, with an OpenAPI specification published by Sage.
    humanURL: https://developer.sage.com/intacct/docs/1/sage-intacct-rest-api/
    baseURL: https://api.intacct.com/ia/api/v1
    tags:
      - REST
      - OAuth 2.0
      - Financials
      - Accounting
    properties:
      - type: Documentation
        url: https://developer.sage.com/intacct/docs/1/sage-intacct-rest-api/
      - type: GettingStarted
        url: https://developer.sage.com/intacct/docs/1/sage-intacct-rest-api/get-started
      - type: Authentication
        url: https://developer.sage.com/intacct/docs/1/sage-intacct-rest-api/authorization-and-security/oauth2
      - type: OpenAPI
        url: https://developer.sage.com/intacct/apis/intacct/1/intacct-openapi
  - aid: sage-intacct:xml-api
    name: Sage Intacct XML API
    description: >-
      Legacy XML API providing programmatic access to general ledger, accounts
      payable, accounts receivable, order entry, purchasing, inventory,
      projects, and platform services. Uses session-based authentication and
      XML request/response payloads.
    humanURL: https://developer.intacct.com/api/
    baseURL: https://api.intacct.com/ia/xml/xmlgw.phtml
    tags:
      - XML
      - Legacy
      - Financials
      - Accounting
    properties:
      - type: Documentation
        url: https://developer.intacct.com/api/
